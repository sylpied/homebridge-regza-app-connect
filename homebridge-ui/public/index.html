<link rel="stylesheet" href="style.css?v=0.6.1" />

<div class="regza-shell">
  <div class="regza-heading">
    <div>
      <h3 id="page-title"></h3>
      <p id="page-description" class="text-muted"></p>
    </div>
    <select id="ui-language" class="form-select regza-language" aria-label="Settings language">
      <option value="auto">Auto</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
  </div>
  <div id="status" class="alert alert-info">Loading settings…</div>
  <div id="devices"></div>
  <button id="add-device" type="button" class="btn btn-outline-primary btn-sm"></button>
  <details class="regza-section regza-global">
    <summary id="global-summary"></summary>
    <div class="regza-section-body">
      <div class="form-check">
        <input id="debug" type="checkbox" class="form-check-input">
        <label id="debug-label" for="debug" class="form-check-label"></label>
      </div>
    </div>
  </details>
</div>

<script src="app.js?v=0.6.1"></script>
